services:
  postgres:
    image: postgres:15
    container_name: docflow_postgres
    environment:
      POSTGRES_USER: docflow
      POSTGRES_PASSWORD: docflow
      POSTGRES_DB: docflow
      TZ: UTC
      PGTZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: docflow_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  